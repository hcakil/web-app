        .markdown-content h1 { font-size: 2rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #292524; border-bottom: 2px solid #0d9488; padding-bottom: 0.5rem; scroll-margin-top: 1rem; }

        .markdown-content li { margin-bottom: 0.5rem; line-height: 1.6; }
        .markdown-content code { background-color: #f5f5f4; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.875rem; color: #dc2626; }
        .markdown-content pre { background-color: #1f2937; color: #f9fafb; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-content pre code { background-color: transparent; color: #f9fafb; padding: 0; font-size: 0.875rem; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; overflow-x: auto; display: block; }
        .markdown-content table th, .markdown-content table td { border: 1px solid #d1d5db; padding: 0.5rem; text-align: left; }
        .markdown-content table th { background-color: #f3f4f6; font-weight: 600; }
        .markdown-content blockquote { border-left: 4px solid #0d9488; padding-left: 1rem; margin-left: 0; margin-bottom: 1rem; color: #6b7280; font-style: italic; }
        .markdown-content a { color: #0d9488; text-decoration: underline; }
        .markdown-content a:hover { color: #0f766e; }
        .markdown-content hr { border: none; border-top: 2px solid #e5e7eb; margin: 2rem 0; }
        html { scroll-behavior: smooth; }
        .tab-button { transition: all 0.3s ease; cursor: pointer; }
        .tab-button.active { border-bottom-color: #0d9488; color: #0d9488; font-weight: 600; }
        .tab-button:hover { color: #0d9488; }
        .doc-content { display: none; }
        .doc-content.active { display: block; }

            var documents = { addon: { container: 'addon-container', content: 'addon-content', raw: ADDON_B64 }, checklist: { container: 'checklist-container', content: 'checklist-content', raw: CHECKLIST_B64 } };
            marked.setOptions({ headerIds: true, mangle: false });
            function decodeUtf8(b64) {
                var binary = atob(b64);
                var bytes = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return (typeof TextDecoder !== 'undefined' ? new TextDecoder().decode(bytes) : binary);
            }
            function renderDoc(key) {
                var doc = documents[key];
                if (!doc || !doc.raw) return;
                var markdown = decodeUtf8(doc.raw);
                var html = marked.parse(markdown);
                var el = document.getElementById(doc.container);
                if (el) { el.innerHTML = html; fixAnchorLinks(el); }
            }
            function generateAnchorId(text) {
                return text.toLowerCase().replace(/[^\\w\\s-]/g,'').replace(/\\s+/g,'-').replace(/-+/g,'-').replace(/^-+|-+$/g,'').trim();
            }
            function fixAnchorLinks(container) {
                var headings = container.querySelectorAll('h1,h2,h3,h4,h5,h6');
                headings.forEach(function(h){ if(!h.id) h.id = generateAnchorId(h.textContent || h.innerText); });
                var links = container.querySelectorAll('a[href^="#"]');
                links.forEach(function(link){
                    var href = link.getAttribute('href'); if(!href || !href.startsWith('#')) return;
                    var targetId = href.substring(1);
                    var target = Array.from(headings).find(function(h){ return (h.id || generateAnchorId(h.textContent||h.innerText)) === targetId; });
                    if (target && target.id) { link.setAttribute('href','#'+target.id); link.addEventListener('click',function(e){ e.preventDefault(); document.getElementById(target.id).scrollIntoView({behavior:'smooth',block:'start'}); }); }
                });
            }
            function scrollToAnchor(id) { var el = document.getElementById(id); if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
            function switchDocument(docKey) {
                document.querySelectorAll('.tab-button').forEach(function(btn){ btn.classList.remove('active'); if(btn.getAttribute('data-doc')===docKey) btn.classList.add('active'); });
                ['addon','checklist'].forEach(function(k){ var c = document.getElementById(documents[k].content); if(c) c.classList.toggle('active', k===docKey); });
                var url = new URL(window.location); url.searchParams.set('doc', docKey); window.history.pushState({doc:docKey}, '', url);
            }
            document.querySelectorAll('.tab-button').forEach(function(btn){ btn.addEventListener('click', function(){ switchDocument(this.getAttribute('data-doc')); }); });
            window.addEventListener('popstate', function(){ var p = new URLSearchParams(window.location.search); switchDocument(p.get('doc')||'addon'); });
            renderDoc('addon'); renderDoc('checklist');
            var initial = (new URLSearchParams(window.location.search)).get('doc') || 'addon';
            switchDocument(initial);
            if (window.location.hash) setTimeout(function(){ scrollToAnchor(window.location.hash.substring(1)); }, 100);
        })();
